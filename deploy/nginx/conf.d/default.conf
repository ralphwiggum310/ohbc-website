# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name orchardhillsbiblechurch.com www.orchardhillsbiblechurch.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orchardhillsbiblechurch.com www.orchardhillsbiblechurch.com;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/orchardhillsbiblechurch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orchardhillsbiblechurch.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    
    # Root directory
    root /var/www/html;
    index index.html;

    # Proxy configuration for Next.js app
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location /_next/static/ {
        proxy_cache STATIC;
        proxy_pass http://web:3000;
        proxy_cache_valid 200 1y;
        proxy_cache_use_stale error timeout invalid_header updating
                             http_500 http_502 http_503 http_504;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve static files directly from Nginx for better performance
    location ~* ^/(images|logo|fonts|_next/static)/ {
        proxy_pass http://web:3000;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Handle other static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://web:3000;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Disable caching for Next.js data
    location /_next/data/ {
        proxy_pass http://web:3000;
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        expires off;
        add_header Cache-Control "no-cache";
    }
}
